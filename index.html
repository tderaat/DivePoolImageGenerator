<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FS4 Dive Pool Image Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FS4 Dive Pool Image Generator</h1>
    <p class="hint">
      Paste jumps, one per line. Separate elements with spaces or dashes.
    </p>
  </header>

  <section class="input-panel">
    <textarea id="jumps-input" rows="10" spellcheck="false">21 M F</textarea>
    <div class="actions">
      <button id="generate-btn" type="button">Generate</button>
      <button id="clear-btn" type="button">Clear</button>
      <button id="print-btn" type="button">PDF</button>
    </div>

    <div class="color-pickers">
      <label><span>Point</span><input type="color" id="color-point" value="#d23a28"></label>
      <label><span>Tail</span><input type="color" id="color-tail" value="#f0cd2a"></label>
      <label><span>Inside</span><input type="color" id="color-inside" value="#3182ce"></label>
      <label><span>Outside</span><input type="color" id="color-outside" value="#4aa04a"></label>
      <button id="reset-colors-btn" type="button">Reset colors</button>
    </div>
  </section>

  <section id="results"></section>

  <script src="script.js"></script>
</body>
</html>
