<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FS4 Dive Pool Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FS4 Dive Pool Generator</h1>
    <p class="hint">
      Paste jumps, one per line. Separate elements with spaces or dashes.
      Numbers are blocks (1&ndash;22), letters are randoms (A&ndash;H, J&ndash;Q).
      Example: <code>21 M F</code>
    </p>
  </header>

  <section class="input-panel">
    <textarea id="jumps-input" rows="10" spellcheck="false">21 M F</textarea>
    <div class="actions">
      <button id="generate-btn" type="button">Generate</button>
      <button id="clear-btn" type="button">Clear</button>
    </div>
  </section>

  <section id="results"></section>

  <script src="script.js"></script>
</body>
</html>
